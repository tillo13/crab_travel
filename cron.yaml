cron:
- description: "Crab Crawlers — run a random bot trip + nurture past trips"
  url: /tasks/crawl
  schedule: every 2 hours
  timezone: America/Los_Angeles

- description: "Refresh global deals cache from all travel APIs"
  url: /tasks/refresh-deals
  schedule: every 24 hours
  timezone: America/Los_Angeles

- description: "Check member price watches — prioritized by departure date"
  url: /tasks/check-watches
  schedule: every 8 hours
  timezone: America/Los_Angeles

