<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}crab.travel{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    (function() {
      var theme = localStorage.getItem('crab-theme');
      if (theme === 'light') document.documentElement.classList.remove('dark');
    })();
  </script>
  <style>
    .user-menu { display:none; position:absolute; right:0; top:100%; margin-top:0.5rem; width:13rem; background:white; border-radius:0.5rem; box-shadow:0 10px 25px rgba(0,0,0,0.15); z-index:50; overflow:hidden; }
    .dark .user-menu { background:#1f2937; }
    .user-menu.show { display:block; }
    .menu-item { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; font-size:0.875rem; color:#374151; text-decoration:none; }
    .dark .menu-item { color:#d1d5db; }
    .menu-item:hover { background:#f3f4f6; }
    .dark .menu-item:hover { background:#374151; }
    .menu-danger { color:#dc2626 !important; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 md:px-6 py-2.5 md:py-3 sticky top-0 z-50 shadow-sm">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="text-xl font-bold text-gray-900 dark:text-white">🦀 crab.travel</a>
        {% if session.user %}
        <div class="hidden md:flex gap-4 text-sm">
          <a href="/dashboard" class="{% if active_page == 'dashboard' %}text-blue-600 dark:text-blue-400 font-semibold{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white{% endif %}">My Plans</a>
          <a href="/profile" class="{% if active_page == 'profile' %}text-blue-600 dark:text-blue-400 font-semibold{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white{% endif %}">Profile</a>
        </div>
        {% endif %}
      </div>
      <div class="flex items-center gap-2 text-sm">
        <button onclick="toggleTheme()" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" title="Toggle dark mode">
          <svg id="sun-icon" class="w-5 h-5 text-yellow-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moon-icon" class="w-5 h-5 text-gray-500 dark:text-gray-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        {% if session.user %}
        <div class="relative">
          <button onclick="document.getElementById('user-menu').classList.toggle('show')" class="flex items-center gap-2 p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
            {% if session.user.picture %}
            <img src="{{ session.user.picture }}" class="w-7 h-7 rounded-full" alt="">
            {% else %}
            <div class="w-7 h-7 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold">{{ session.user.name[0]|upper }}</div>
            {% endif %}
          </button>
          <div id="user-menu" class="user-menu">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-600">
              <div class="font-semibold text-sm truncate">{{ session.user.name }}</div>
              <div class="text-xs text-gray-400 truncate">{{ session.user.email }}</div>
            </div>
            <div class="py-1">
              <a href="/profile" class="menu-item">Profile</a>
              <a href="/logout" class="menu-item menu-danger">Sign out</a>
            </div>
          </div>
        </div>
        {% else %}
        <a href="/login" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-blue-700">Sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6 md:px-6 md:py-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.classList.toggle('dark');
      localStorage.setItem('crab-theme', isDark ? 'dark' : 'light');
      updateThemeIcons();
    }
    function updateThemeIcons() {
      var isDark = document.documentElement.classList.contains('dark');
      document.getElementById('sun-icon').style.display = isDark ? 'none' : 'block';
      document.getElementById('moon-icon').style.display = isDark ? 'block' : 'none';
    }
    updateThemeIcons();
    // Close dropdown on outside click
    document.addEventListener('click', function(e) {
      var menu = document.getElementById('user-menu');
      if (menu && !e.target.closest('.relative')) menu.classList.remove('show');
    });
  </script>
</body>
</html>
