{% extends "base.html" %}
{% block title %}Contact — crab.travel{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto animate-in">
<h1 class="text-3xl font-display mb-2">Contact Us</h1>
<p class="text-sm text-crab-sand-dim mb-8">Questions, feedback, or just want to say hi? We'd love to hear from you.</p>

<div class="bg-crab-card/40 border border-white/6 rounded-2xl p-6 md:p-8">
  <form id="contact-form" class="space-y-5">
    <!-- Honeypot -->
    <input type="text" name="website" id="hp-field" style="display:none" tabindex="-1" autocomplete="off">
    <input type="hidden" name="form_loaded_at" id="form-loaded-at">

    <div>
      <label class="block text-sm font-semibold font-display mb-1">Your email</label>
      <input type="email" id="contact-email" name="email" required placeholder="you@example.com"
        class="w-full px-4 py-2.5 rounded-lg border border-white/10 bg-white/4 text-crab-sand text-sm focus:border-crab-coral focus:outline-none transition-colors">
    </div>

    <div>
      <label class="block text-sm font-semibold font-display mb-1">Message</label>
      <textarea id="contact-message" name="message" rows="5" required placeholder="What's on your mind?"
        class="w-full px-4 py-2.5 rounded-lg border border-white/10 bg-white/4 text-crab-sand text-sm focus:border-crab-coral focus:outline-none transition-colors"></textarea>
    </div>

    <div id="contact-status" class="hidden text-sm rounded-lg p-3"></div>

    <button type="submit"
      class="w-full bg-crab-coral text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-crab-coral-light transition-all hover:shadow-lg hover:shadow-crab-coral/20">
      Send Message
    </button>
  </form>
</div>
</div>

<script>
document.getElementById('form-loaded-at').value = Date.now();

document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type="submit"]');
  var status = document.getElementById('contact-status');
  var email = document.getElementById('contact-email').value;
  var message = document.getElementById('contact-message').value;
  var hp = document.getElementById('hp-field').value;
  var loadedAt = parseInt(document.getElementById('form-loaded-at').value);
  var now = Date.now();

  if (hp) return;

  if (now - loadedAt < 3000) {
    status.className = 'text-sm rounded-lg p-3 bg-amber-500/10 border border-amber-500/20 text-amber-400';
    status.textContent = 'Please take a moment to review your message before sending.';
    status.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    var res = await fetch('/api/contact', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, message: message, honeypot: hp, time_open: now - loadedAt}),
    });
    var data = await res.json();
    if (res.ok) {
      status.className = 'text-sm rounded-lg p-3 bg-crab-teal/10 border border-crab-teal/20 text-crab-teal';
      status.textContent = "Message sent! We'll get back to you soon.";
      this.reset();
      document.getElementById('form-loaded-at').value = Date.now();
    } else {
      throw new Error(data.error || 'Failed to send');
    }
  } catch(err) {
    status.className = 'text-sm rounded-lg p-3 bg-crab-coral/10 border border-crab-coral/20 text-crab-coral';
    status.textContent = 'Failed to send. Please try again.';
  } finally {
    status.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
});
</script>
{% endblock %}
